version: '3'

services:

  mongodb:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    image: backend:v1
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    image: frontent:v1
    ports:
      - "3000:80"
    depends_on:
      - backend
